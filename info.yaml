# Tiny Tapeout project information
project:
  title:        "8-bit Risc"      # Project title
  author:       "Jan"      # Your name
  discord:      "johndoe1285"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "8-bit Risc uP"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_asic_cpu"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "Adder.v"
    - "ALU.v"
    - "Branch_Control.v"
    - "Control_Unit.v"
    - "CPU_Core.v"
    - "Data_Memory.v"
    - "Imm_Gen.v"
    - "Instruction_Memory.v"
    - "Muxes.v"
    - "PCplus4Adder.v"
    - "Program_Counter.v"
    - "Registers.v"
    

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "instruction[0]"
  ui[1]: "instruction[1]"
  ui[2]: "instruction[2]"
  ui[3]: "instruction[3]"
  ui[4]: "instruction[4]"
  ui[5]: "instruction[5]"
  ui[6]: "instruction[6]"
  ui[7]: "instruction[7]"

  # Outputs
  uo[0]: "CPU_Out[0]"
  uo[1]: "CPU_Out[1]"
  uo[2]: "CPU_Out[2]"
  uo[3]: "CPU_Out[3]"
  uo[4]: "CPU_Out[4]"
  uo[5]: "CPU_Out[5]"
  uo[6]: "CPU_Out[6]"
  uo[7]: "CPU_Out[7]"

  # Bidirectional pins
  uio[0]: "instruction[8]"
  uio[1]: "instruction[9]"
  uio[2]: "instruction[10]"
  uio[3]: "instruction[11]"
  uio[4]: "instruction[12]"
  uio[5]: "instruction[13]"
  uio[6]: "instruction[14]"
  uio[7]: "instruction[15]"

# Do not change!
yaml_version: 6
